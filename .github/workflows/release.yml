name: Release

# Publish binaries when a version tag is pushed (e.g. v0.1.0): macOS (Apple Silicon + Intel)
# and Linux/Windows (x86_64). macOS is the only fully tested platform; Linux and Windows are
# built from the same source and pass CI, but are not exercised against real save files —
# see the caveat in README.md.
on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: fringe-retro
  MAP_BIN_NAME: fringe-retro-map

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin # macOS Apple Silicon
            os: macos-latest
          - target: x86_64-apple-darwin # macOS Intel
            os: macos-latest
          - target: x86_64-unknown-linux-gnu # Linux
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc # Windows
            os: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build release binaries
        run: cargo build --release --locked --bin ${{ env.BIN_NAME }} --bin ${{ env.MAP_BIN_NAME }} --target ${{ matrix.target }}

      - name: Package tarball + checksum (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          stage="${BIN_NAME}-${GITHUB_REF_NAME}-${{ matrix.target }}"
          mkdir "$stage"
          cp "target/${{ matrix.target }}/release/${BIN_NAME}" "$stage/"
          cp "target/${{ matrix.target }}/release/${MAP_BIN_NAME}" "$stage/"
          cp README.md LICENSE COMMANDS.md "$stage/"
          tar -czf "${stage}.tar.gz" "$stage"
          if command -v shasum >/dev/null 2>&1; then
            shasum -a 256 "${stage}.tar.gz" > "${stage}.tar.gz.sha256"
          else
            sha256sum "${stage}.tar.gz" > "${stage}.tar.gz.sha256"
          fi

      - name: Package zip + checksum (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $stage = "$env:BIN_NAME-$env:GITHUB_REF_NAME-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $stage | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/$env:BIN_NAME.exe" "$stage/"
          Copy-Item "target/${{ matrix.target }}/release/$env:MAP_BIN_NAME.exe" "$stage/"
          Copy-Item README.md, LICENSE, COMMANDS.md "$stage/"
          $zip = "$stage.zip"
          Compress-Archive -Path $stage -DestinationPath $zip
          $hash = (Get-FileHash -Algorithm SHA256 $zip).Hash.ToLower()
          "$hash  $zip" | Out-File -Encoding ascii "$zip.sha256"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          if-no-files-found: ignore
          path: |
            *.tar.gz
            *.tar.gz.sha256
            *.zip
            *.zip.sha256

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the release and upload assets
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history + tags, so we can list commits since the previous tag

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Build the commit changelog
        shell: bash
        run: |
          set -euo pipefail
          current="$GITHUB_REF_NAME"
          # The most recent tag before this one (by ancestry), if any.
          prev="$(git describe --tags --abbrev=0 "${current}^" 2>/dev/null || true)"
          if [ -n "$prev" ]; then
            echo "### Commits since ${prev}" > CHANGELOG_NOTES.md
            range="${prev}..${current}"
          else
            echo "### Commits" > CHANGELOG_NOTES.md
            range="$current"
          fi
          echo "" >> CHANGELOG_NOTES.md
          git log --no-merges --reverse --pretty='- %s (%h)' "$range" >> CHANGELOG_NOTES.md

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          # Our commit list is prepended to GitHub's auto-generated notes (compare link, etc.).
          body_path: CHANGELOG_NOTES.md
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.tar.gz.sha256
            artifacts/**/*.zip
            artifacts/**/*.zip.sha256
          generate_release_notes: true
          # Mark pre-1.0 / rc / beta tags (those containing a hyphen) as pre-releases.
          prerelease: ${{ contains(github.ref_name, '-') }}

  homebrew:
    name: Update Homebrew tap
    needs: release
    runs-on: ubuntu-latest
    # Only real releases update the tap (skip prereleases like v0.3.0-rc1). Requires a
    # HOMEBREW_TAP_TOKEN secret: a token with contents:write on FourFringe/homebrew-tap.
    if: ${{ !contains(github.ref_name, '-') }}
    steps:
      - name: Check out this repository
        uses: actions/checkout@v4

      - name: Read release checksums
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          gh release download "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
            --pattern '*.sha256' --dir sums
          arm=$(awk '{print $1}' sums/*aarch64-apple-darwin.tar.gz.sha256)
          intel=$(awk '{print $1}' sums/*x86_64-apple-darwin.tar.gz.sha256)
          echo "ARM_SHA=$arm" >> "$GITHUB_ENV"
          echo "INTEL_SHA=$intel" >> "$GITHUB_ENV"

      - name: Check out the Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: FourFringe/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Render and commit the formula
        run: |
          set -euo pipefail
          python3 packaging/homebrew/update_formula.py \
            "$VERSION" "$ARM_SHA" "$INTEL_SHA" \
            packaging/homebrew/fringe-retro.rb \
            tap/Formula/fringe-retro.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/fringe-retro.rb
          if git diff --cached --quiet; then
            echo "Formula already up to date."
          else
            git commit -m "fringe-retro ${VERSION}"
            git push
          fi

