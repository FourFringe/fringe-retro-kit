name: Release

# Publish macOS binaries when a version tag is pushed (e.g. v0.1.0).
# Windows/Linux are built and tested on every push by CI (ci.yml) as a quality gate, but
# only macOS is published for now — see ROADMAP.md.
on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: fringe-retro

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-apple-darwin # Apple Silicon
          - x86_64-apple-darwin # Intel
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked --bin "$BIN_NAME" --target ${{ matrix.target }}

      - name: Package tarball + checksum
        run: |
          set -euo pipefail
          stage="${BIN_NAME}-${GITHUB_REF_NAME}-${{ matrix.target }}"
          mkdir "$stage"
          cp "target/${{ matrix.target }}/release/${BIN_NAME}" "$stage/"
          cp README.md LICENSE COMMANDS.md "$stage/"
          tar -czf "${stage}.tar.gz" "$stage"
          shasum -a 256 "${stage}.tar.gz" > "${stage}.tar.gz.sha256"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            *.tar.gz
            *.tar.gz.sha256

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the release and upload assets
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.tar.gz.sha256
          generate_release_notes: true
          # Mark pre-1.0 / rc / beta tags (those containing a hyphen) as pre-releases.
          prerelease: ${{ contains(github.ref_name, '-') }}
