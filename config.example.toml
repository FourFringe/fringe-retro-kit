# Fringe Retro Kit — local configuration (EXAMPLE / template)
#
# Copy this file to `config.toml` (which is gitignored) and adjust the paths for
# your machine. `config.toml` holds machine-specific absolute paths and is never
# committed to git.
#
# Format is TOML (the app-config format we've settled on; game *schemas* may use a
# different format later). This schema will grow as the tool matures.
#
# Phase 1 note: the tool reads this file from the current working directory (or the
# path in the FRINGE_RETRO_CONFIG environment variable). A proper per-OS config
# location is planned.

[games.ultima1]
# Directory that holds the Ultima I save files (PLAYER1.U1 … PLAYER4.U1). When you
# pass a *bare* file name to a command (e.g. `fringe-retro inspect PLAYER1.U1`), it is
# resolved against this directory. On a GOG/macOS install the saves live inside the
# app bundle, e.g.:
save_dir = "/Applications/Ultima I.app/Contents/Resources/game"
