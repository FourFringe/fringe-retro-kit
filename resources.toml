# Fringe Retro Kit — curated web resources for the supported games.
#
# Each entry is keyed by the built-in game id (ultima1..ultima5, wasteland — the same ids
# `fringe-retro games` shows). Fields: title, url, category. Category is a free label used to
# group links in the UI; suggested values: wiki, walkthrough, map, format, play.
#
# These defaults ship with the tool. To add or override links, set the FRINGE_RETRO_RESOURCES
# environment variable to your own file, or place a `resources.toml` in the working directory;
# your entries are merged in (links with a URL already present are skipped).
#
# All URLs below were checked live. If one rots, please update it here.

