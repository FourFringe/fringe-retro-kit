<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Fringe Retro Kit — Map</title>
    <link rel="stylesheet" href="/leaflet.css" />
    <script src="/leaflet.js"></script>
    <style>
      html,
      body,
      #map {
        height: 100%;
        margin: 0;
        background: #0b0b12;
      }
      #err {
        color: #ddd;
        font-family: system-ui, sans-serif;
        padding: 2rem;
      }
      /* Keep the pixel art crisp when zoomed in past native resolution. */
      .leaflet-tile {
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }
      .home {
        position: absolute;
        z-index: 1000;
        top: 10px;
        right: 10px;
        background: #1b1b2b;
        color: #ddd;
        padding: 4px 10px;
        border-radius: 4px;
        font-family: system-ui, sans-serif;
        text-decoration: none;
      }
      /* Legend key for synthesised dungeon glyphs, shown under the POI controls. */
      .legend {
        background: #1b1b2b;
        color: #ddd;
        padding: 6px 9px;
        border-radius: 4px;
        font-family: system-ui, sans-serif;
        font-size: 12px;
        box-shadow: 0 1px 5px rgba(0, 0, 0, 0.4);
        max-height: 70vh;
        overflow-y: auto;
      }
      .legend-title {
        font-weight: 600;
        margin-bottom: 4px;
      }
      .legend-row {
        display: flex;
        align-items: center;
        gap: 7px;
        white-space: nowrap;
        line-height: 22px;
      }
      .legend-swatch {
        width: 22px;
        height: 22px;
        flex: 0 0 auto;
        background-image: url(/legend.png);
        background-repeat: no-repeat;
        background-size: 22px auto;
        image-rendering: pixelated;
        border: 1px solid #33334a;
      }
    </style>
  </head>
  <body>
    <a class="home" href="/">← All maps</a>
    <div id="map"></div>
    <script>
      const bundle = new URLSearchParams(location.search).get("bundle");
      async function main() {
        if (!bundle) {
          document.body.innerHTML = '<div id="err">No map selected. <a href="/">Back to the list.</a></div>';
          return;
        }
        const base = "/b" + bundle;
        const m = await (await fetch(base + "/manifest.json")).json();
        // Allow zooming in past native resolution; Leaflet upscales the native tiles
        // (crisp, thanks to image-rendering above) instead of us baking bigger tiles.
        const EXTRA_ZOOM = 2;
        const maxZoom = m.maxZoom + EXTRA_ZOOM;
        const map = L.map("map", {
          crs: L.CRS.Simple,
          minZoom: 0,
          maxZoom: maxZoom,
          attributionControl: false,
        });
        // Place the pixel-space image into Leaflet's tile grid at native zoom.
        const sw = map.unproject([0, m.height], m.maxZoom);
        const ne = map.unproject([m.width, 0], m.maxZoom);
        const bounds = new L.LatLngBounds(sw, ne);
        L.tileLayer(base + "/{z}/{x}/{y}.png", {
          tileSize: m.tileSize,
          minZoom: 0,
          maxZoom: maxZoom,
          maxNativeZoom: m.maxZoom,
          bounds: bounds,
          noWrap: true,
        }).addTo(map);
        map.setMaxBounds(bounds);
        map.fitBounds(bounds);
        document.title = m.title + " — Fringe Retro Kit";

        // Pixel (x, y) in the image → a Leaflet LatLng at native zoom.
        const at = (px, py) => map.unproject([px, py], m.maxZoom);

        // POI markers, grouped by kind so they can be toggled.
        const STYLE = {
          town: { color: "#ffd24a", label: "Towns" },
          village: { color: "#7bd88f", label: "Villages" },
          castle: { color: "#ff5555", label: "Castles" },
          tower: { color: "#ff9f43", label: "Towers" },
          dungeon: { color: "#c78bff", label: "Dungeons" },
          shrine: { color: "#8ad2ff", label: "Shrines" },
          monument: { color: "#8ad2ff", label: "Monuments" },
          passage: { color: "#33d6ff", label: "Passages" },
        };
        const groups = {};
        for (const p of m.pois || []) {
          const s = STYLE[p.kind] || { color: "#cccccc", label: p.kind };
          const ll = at(p.px, p.py);
          // Draw each POI as a "donut": a filled centre dot inside a bold ring, so even a single
          // tile is easy to spot on a busy map. Both parts share the tooltip and click target.
          const dot = L.circleMarker(ll, {
            radius: 4,
            color: s.color,
            weight: 1,
            fillColor: s.color,
            fillOpacity: 1,
          });
          const ring = L.circleMarker(ll, {
            radius: 10,
            color: s.color,
            weight: 3,
            fill: false,
            opacity: 0.95,
          });
          const tip = p.target ? p.label + " — click to open" : p.label;
          for (const part of [ring, dot]) {
            part.bindTooltip(tip);
            // POIs that lead to another map become clickable jumps to that bundle.
            if (p.target) {
              part.on("click", () => {
                window.location.href = "/view?bundle=" + encodeURIComponent(p.target);
              });
              part.on("add", () => {
                const el = part.getElement();
                if (el) el.style.cursor = "pointer";
              });
            }
          }
          (groups[p.kind] ||= L.layerGroup()).addLayer(L.layerGroup([ring, dot]));
        }
        const overlays = {};
        for (const kind of Object.keys(groups)) {
          const s = STYLE[kind] || { label: kind };
          groups[kind].addTo(map);
          overlays[s.label] = groups[kind];
        }
        if (Object.keys(overlays).length) {
          L.control.layers(null, overlays, { collapsed: false }).addTo(map);
        }

        // Dungeon maps are drawn with synthesised glyphs, so show a key of just the symbols this
        // game uses (m.legend). It's added after the POI control, so in the top-right corner it
        // stacks just under the POI checkboxes.
        if (m.legend && m.legend.length) {
          try {
            // The full ordered label list gives each glyph's row in the /legend.png sprite strip.
            const order = await (await fetch("/legend.json")).json();
            const row = {};
            order.forEach((label, i) => (row[label] = i));
            const Legend = L.Control.extend({
              options: { position: "topright" },
              onAdd() {
                const div = L.DomUtil.create("div", "legend");
                div.innerHTML =
                  '<div class="legend-title">Legend</div>' +
                  m.legend
                    .filter((label) => label in row)
                    .map(
                      (label) =>
                        '<div class="legend-row"><span class="legend-swatch" style="background-position:0 ' +
                        -row[label] * 22 +
                        'px"></span>' +
                        label +
                        "</div>",
                    )
                    .join("");
                L.DomEvent.disableClickPropagation(div);
                L.DomEvent.disableScrollPropagation(div);
                return div;
              },
            });
            new Legend().addTo(map);
          } catch (e) {
            /* the legend is optional */
          }
        }

        // "You are here": the party's live position, streamed from the server, which watches
        // the save file and pushes an update whenever you save in-game.
        let playerMarker = null;
        function setPlayer(px, py) {
          const ll = at(px, py);
          if (playerMarker) {
            playerMarker.setLatLng(ll);
          } else {
            playerMarker = L.circleMarker(ll, {
              radius: 7,
              color: "#ffffff",
              weight: 3,
              fillColor: "#39ff14",
              fillOpacity: 0.9,
            })
              .bindTooltip("You are here")
              .addTo(map);
          }
        }
        // Ask once whether this game+world shows a live position. If not, skip the stream
        // entirely so we don't hold an idle server connection open.
        const posQuery =
          "?game=" +
          encodeURIComponent(m.game) +
          "&world=" +
          encodeURIComponent(m.world);
        const pos0 = await (await fetch("/api/position" + posQuery)).json();
        if (pos0.supported) {
          if (pos0.px != null && pos0.py != null) setPlayer(pos0.px, pos0.py);
          const events = new EventSource("/api/position/stream" + posQuery);
          // Close the stream when leaving the page. Otherwise the long-lived connection can
          // linger past navigation and, stacked across map clicks, exhaust the browser's
          // per-host connection limit — which stalls tile loads until the server times it out.
          window.addEventListener("pagehide", () => events.close());
          events.onmessage = (ev) => {
            try {
              const pos = JSON.parse(ev.data);
              if (pos.px != null && pos.py != null) setPlayer(pos.px, pos.py);
            } catch (e) {
              /* ignore malformed events */
            }
          };
          // EventSource reconnects automatically if the connection drops.
        }
      }
      main();
    </script>
  </body>
</html>
